<!DOCTYPE html>

<head>

<title>族谱排版风格 - 效果图预览</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #F5F7FA;
    padding: 24px;
    color: #303133;
  }
  h1 {
    font-size: 22px;
    margin-bottom: 8px;
  }
  .desc {
    color: #909399;
    font-size: 14px;
    margin-bottom: 24px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    max-width: 1400px;
  }
  .card {
    background: #FAFBFC;
    border: 2px solid #E4E7ED;
    border-radius: 8px;
    padding: 12px;
    display: flex;
    flex-direction: column;
  }
  .card.active {
    border-color: #5D4037;
    background: #FBF6EC;
    box-shadow: 0 4px 16px rgba(93,64,55,.18);
  }
  .badge {
    align-self: flex-start;
    background: #67C23A;
    color: #FFF;
    border-radius: 10px;
    padding: 2px 10px;
    font-size: 11px;
    margin-bottom: 8px;
    display: inline-block;
  }
  .preview {
    background: #FFF;
    border-radius: 4px;
    border: 1px solid #E4E7ED;
    overflow: hidden;
    aspect-ratio: 1 / 1;
  }
  .preview svg { width: 100%; height: 100%; display: block; }
  .info { margin-top: 12px; }
  .info-title {
    display: flex;
    align-items: baseline;
    gap: 8px;
    flex-wrap: wrap;
  }
  .info-label { font-size: 16px; font-weight: 600; }
  .info-sub {
    font-size: 12px;
    color: #909399;
    background: #F0F2F5;
    padding: 1px 8px;
    border-radius: 10px;
  }
  .info-desc {
    font-size: 12px;
    color: #606266;
    margin-top: 6px;
    line-height: 1.6;
  }
</style>
