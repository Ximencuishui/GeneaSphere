<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 720" width="1000" height="720">
  <!--
    中国疆域示意（fallback 底图）
    仅在 CartoDB/高德瓦片全部加载失败时使用
    风格：与品牌暗色调一致（背景 #1e1c22，陆地 #2a2630，国界线 #C9A96E）
    坐标来源：public/geojson/dynasties/modern.geojson（19 点简化轮廓）+ 台湾/海南岛示意
    viewBox 0 0 1000 720，地图范围 73-135°E（X 0-1000），18-54°N（Y 0-720）
    公式：x = (lng - 73) / 62 * 1000，y = (54 - lat) / 36 * 720
  -->
  <defs>
    <linearGradient id="landGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a3340" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#2a2530" stop-opacity="0.9"/>
    </linearGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.7">
      <stop offset="0%" stop-color="#1e1c22" stop-opacity="0"/>
      <stop offset="100%" stop-color="#0a090c" stop-opacity="0.6"/>
    </radialGradient>
  </defs>

  <!-- 背景 -->
  <rect width="1000" height="720" fill="#1e1c22"/>

  <!-- 中国大陆（含 9 段线，南海） -->
  <!-- 主轮廓：现代疆域（19 点简化版，按公式换算到 viewBox） -->
  <!-- 73,39 → 0,300 | 78,42 → 80.6,240 | 85,47 → 193.5,140 | 95,49 → 354.8,100 -->
  <!-- 110,49 → 596.8,100 | 120,48 → 758.1,120 | 128,47 → 887.1,140 | 134,45 → 983.9,180 -->
  <!-- 135,40 → 1000,280 | 128,34 → 887.1,400 | 122,28 → 758.1,520 | 118,22 → 693.5,640 -->
  <!-- 108,21 → 564.5,660 | 100,21 → 435.5,660 | 92,22 → 306.5,640 | 85,26 → 193.5,560 -->
  <!-- 78,32 → 80.6,440 | 73,39 → 0,300 -->
  <g fill="url(#landGrad)" stroke="#C9A96E" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round" opacity="0.85">
    <!-- 大陆主体 -->
    <path d="M 0,300 L 81,240 L 194,140 L 355,100 L 597,100 L 758,120 L 887,140 L 984,180 L 1000,280 L 887,400 L 758,520 L 694,640 L 565,660 L 436,660 L 307,640 L 194,560 L 81,440 Z"/>

    <!-- 台湾岛（约 25°N, 121°E → 774,580） -->
    <path d="M 766,540 Q 780,550 778,580 Q 774,600 760,595 Q 752,580 758,560 Q 762,545 766,540 Z"/>

    <!-- 海南岛（约 19°N, 109°E → 581,700） -->
    <path d="M 540,695 Q 580,690 600,705 Q 605,718 590,720 Q 555,720 540,710 Q 535,700 540,695 Z"/>

    <!-- 九段线（南海 U 形示意，约 4-21°N, 109-120°E） -->
    <path d="M 581,718 Q 590,660 620,610 Q 660,565 720,540 Q 770,530 770,560" fill="none" stroke="#C9A96E" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.5"/>
    <path d="M 540,712 Q 520,650 500,600 Q 480,560 460,540 Q 430,530 400,540" fill="none" stroke="#C9A96E" stroke-width="1.2" stroke-dasharray="3 2" opacity="0.35"/>
  </g>

  <!-- 主要省份分隔线（示意，让地图有"真实地图"的颗粒感） -->
  <g fill="none" stroke="#C9A96E" stroke-width="0.6" opacity="0.18" stroke-dasharray="2 3">
    <!-- 黄河大致线（黑河-腾冲线以西） -->
    <path d="M 270,120 Q 285,300 290,500 Q 295,640 320,700"/>
    <!-- 长江大致线 -->
    <path d="M 280,300 Q 480,330 700,310 Q 820,300 880,280"/>
    <!-- 胡焕庸线（黑河-腾冲） -->
    <path d="M 320,80 Q 340,360 370,640"/>
  </g>

  <!-- 暗角 -->
  <rect width="1000" height="720" fill="url(#vignette)"/>

  <!-- 归属 -->
  <text x="990" y="710" text-anchor="end" font-family="'PingFang SC', 'Microsoft YaHei', sans-serif" font-size="11" fill="rgba(255,255,255,0.25)">中国疆域示意 · 寻根路</text>
</svg>
